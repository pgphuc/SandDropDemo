<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jelly Drop 3D</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(180deg,#cfe0f2,#b9c9e6);
    display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none;}
  #app{position:relative;width:min(460px,100vw);height:min(940px,100vh);
    aspect-ratio:460/940;overflow:hidden;border-radius:18px;
    box-shadow:0 18px 50px rgba(40,60,110,.35);}
  #stage{position:absolute;inset:0;}
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  .topbar{position:absolute;top:0;left:0;right:0;height:62px;display:flex;align-items:center;
    justify-content:space-between;padding:0 16px;z-index:5;}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(180deg,#8aa6e0,#5d7fce);box-shadow:0 4px 0 #4663ab,0 6px 10px rgba(40,60,110,.25);
    color:#fff;font-size:20px;display:grid;place-items:center;}
  .iconbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #4663ab;}
  .level{color:#fff;font-weight:800;letter-spacing:2px;font-size:19px;text-shadow:0 2px 3px rgba(40,60,110,.4);}
  /* progress pill overlay sits over belt area */
  .progWrap{position:absolute;left:50%;transform:translateX(-50%);top:64px;width:300px;height:30px;
    display:flex;align-items:center;z-index:5;pointer-events:none;}
  .progTrack{position:relative;width:100%;height:24px;border-radius:14px;background:rgba(255,255,255,.55);
    box-shadow:inset 0 2px 4px rgba(40,60,110,.25);overflow:hidden;}
  .progBar{position:absolute;left:0;top:0;bottom:0;width:0%;border-radius:14px;
    background:linear-gradient(90deg,#7fe07f,#39c4a8);transition:width .25s;}
  .progTxt{position:absolute;width:100%;text-align:center;font-weight:800;font-size:14px;color:#33415a;
    line-height:24px;}
  .hint{position:absolute;left:0;right:0;bottom:8px;text-align:center;color:#4a5a7a;font-size:12px;
    padding:0 20px;z-index:5;opacity:.9;}
  #loader{position:absolute;inset:0;display:grid;place-items:center;background:#bfd0ec;z-index:20;color:#456;font-weight:700;}
  #win{position:absolute;inset:0;display:none;place-items:center;background:rgba(30,45,80,.55);z-index:30;}
  #win.show{display:grid;}
  .winCard{background:#fff;border-radius:22px;padding:30px 34px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .winCard h2{color:#2f8fd0;font-size:30px;margin-bottom:8px;}
  .winCard p{color:#667;margin-bottom:18px;}
  .winCard button{border:none;border-radius:14px;padding:12px 26px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,#7fd07f,#3aa85f);box-shadow:0 5px 0 #2c8049;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="gl"></canvas>
  </div>
  <div class="topbar">
    <button class="iconbtn" id="restart" title="Chơi lại">&#x21bb;</button>
    <div class="level">LEVEL 1</div>
    <button class="iconbtn" id="settings" title="Cài đặt">&#9881;</button>
  </div>
  <div class="progWrap"><div class="progTrack"><div class="progBar" id="bar"></div><div class="progTxt" id="pct">0%</div></div></div>
  <div class="hint">Chạm vào một mảng màu để thả khối thạch — chỉ thả được khi có đường trống thông xuống đáy.</div>
  <div id="loader">Đang tải tài nguyên…</div>
  <div id="win"><div class="winCard"><h2>Hoàn thành! 🎉</h2><p>Bạn đã phân loại hết các khối thạch.</p><button id="again">Chơi lại</button></div></div>
</div>

<script src="lib/three.min.js"></script>
<script src="lib/fflate.min.js"></script>
<script src="lib/NURBSUtils.js"></script>
<script src="lib/NURBSCurve.js"></script>
<script src="lib/FBXLoader.js"></script>
<script src="assets_fbx.js"></script>
<script src="game_core.js"></script>
<script>
  document.getElementById('restart').onclick=()=>location.reload();
  document.getElementById('again').onclick=()=>location.reload();
  window.addEventListener('error',e=>{var l=document.getElementById('loader'); if(l){l.textContent='Lỗi: '+e.message;l.style.display='grid';}});
  JellyDrop.start();
</script>
</body>
</html>
